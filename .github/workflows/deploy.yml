name: Deploy To Aliyun

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          port: ${{ secrets.ALIYUN_SSH_PORT }}
          username: ${{ secrets.ALIYUN_USER }}
          key: ${{ secrets.ALIYUN_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.SERVER_APP_DIR }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            if [ -n "${{ secrets.SERVER_ENV_FILE }}" ]; then
              printf '%s\n' '${{ secrets.SERVER_ENV_FILE }}' > .env
              chmod 600 .env
            fi
            npm ci
            npm run build
            systemctl restart "${{ secrets.SERVER_SYSTEMD_SERVICE }}"
            systemctl status "${{ secrets.SERVER_SYSTEMD_SERVICE }}" --no-pager
